<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP Explainer</title>
    <style>
        body {
            background-color:white;
        }

        #sdp-input {
            resize:none;
            text-align: left;
            overflow: auto;
            field-sizing: content;
            line-height: 15px;
            font-size: 15px;
            width: 100ch;
            min-height: 10lh;
            background-color: transparent;
            white-space: nowrap;
        }
    </style>
    <script src="analyzer.js"></script>
</head>
<body>
    <h1>SDP Explainer</h1>
    <textarea id="sdp-input" name="sdp" placeholder="Paste your SDP here..." oninput="onSDPInput()" onclick="onSDPLineClick(event)"></textarea>
</body>
</html>
